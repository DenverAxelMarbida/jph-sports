<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – JPH Sports Complex</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-dark jph-navbar fixed-top px-4">
  <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
    <img src="logo.png" alt="JPH" height="38">
    <span class="brand-text">JPH <span class="text-yellow">Sports Complex</span></span>
  </a>
</nav>

<div class="auth-page">
  <div class="auth-card" style="max-width:460px;">
    <div class="logo-wrap">
      <img src="logo.png" alt="JPH Logo">
    </div>
    <h2 class="text-center mb-1">Create Account</h2>
    <p class="text-muted text-center small mb-4">Join JPH Sports Complex today</p>

    <div id="regError" class="alert alert-danger py-2 small d-none"></div>
    <div id="regSuccess" class="alert alert-success py-2 small d-none"></div>

    <div class="row g-3">
      <div class="col-6">
        <label class="form-label">First Name</label>
        <input type="text" id="regFirst" class="form-control" placeholder="Karl">
      </div>
      <div class="col-6">
        <label class="form-label">Last Name</label>
        <input type="text" id="regLast" class="form-control" placeholder="Abalay">
      </div>
    </div>
    <div class="mt-3">
      <label class="form-label">Email</label>
      <input type="email" id="regEmail" class="form-control" placeholder="spicyking@gmail.com">
    </div>
  
    <!-- Added phone number field -->
  <div class="mt-3">
      <label class="form-label">Phone Number</label>
      <div class="input-group">
        <span class="input-group-text">+63</span>
        <input 
          type="tel" 
          id="regPhone" 
          class="form-control" 
          placeholder="9XX XXX XXXX"
          maxlength="10"
        >
    </div>
  </div>
  
    <div class="mt-3">
      <label class="form-label">Password</label>
      <input type="password" id="regPwd" class="form-control" placeholder="••••••••••">
      <div class="error-msg mt-1 d-none" id="pwdHint">Must contain at least 8 characters with uppercase and lowercase letters.</div>
    </div>
    <div class="mt-3 mb-3">
      <label class="form-label">Confirm Password</label>
      <input type="password" id="regPwdConfirm" class="form-control" placeholder="••••••••••">
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="agreeTerms">
      <label class="form-check-label small" for="agreeTerms">
        Yes, I agree to the <a href="#" class="auth-link">Terms and Conditions</a>
      </label>
    </div>
    <button class="btn btn-yellow w-100 py-2 mb-3" id="registerBtn">Register</button>
    <p class="text-center small text-muted">Already have an account? <a href="login.html" class="auth-link">Login Now</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="auth.js"></script>
<script>
document.getElementById('registerBtn').addEventListener('click', () => {
  const first = document.getElementById('regFirst').value.trim();
  const last = document.getElementById('regLast').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pwd = document.getElementById('regPwd').value;
  const pwdC = document.getElementById('regPwdConfirm').value;
  const agree = document.getElementById('agreeTerms').checked;
  const err = document.getElementById('regError');
  const suc = document.getElementById('regSuccess');
  const hint = document.getElementById('pwdHint');
  const phoneInput = document.getElementById("regPhone");
  err.classList.add('d-none'); suc.classList.add('d-none'); hint.classList.add('d-none');

  if (!first || !last || !email || !pwd || !pwdC) { err.textContent = 'Please fill in all fields.'; err.classList.remove('d-none'); return; }
  if (!/(?=.*[a-z])(?=.*[A-Z]).{8,}/.test(pwd)) { hint.classList.remove('d-none'); return; }
  if (pwd !== pwdC) { err.textContent = 'Passwords do not match.'; err.classList.remove('d-none'); return; }
  if (!agree) { err.textContent = 'Please agree to the Terms and Conditions.'; err.classList.remove('d-none'); return; }

  suc.textContent = 'Account created! Redirecting to login...';
  suc.classList.remove('d-none');
  setTimeout(() => window.location.href = 'login.html', 1800);
});

  phoneInput.addEventListener("input", () => {
    phoneInput.value = phoneInput.value.replace(/[^0-9]/g, "");
  });
</script>
</body>
</html>
