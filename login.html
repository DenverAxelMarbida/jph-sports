<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In – JPH Sports Complex</title>
  <link rel="icon" type="image/x-icon" href="img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- MINIMAL NAV -->
<nav class="navbar navbar-dark jph-navbar fixed-top px-4">
  <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
    <img src="img/logo.png" alt="JPH" height="38">
    <span class="brand-text">JPH <span class="text-yellow">Sports Complex</span></span>
  </a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="logo-wrap">
      <img src="img/logo.png" alt="JPH Logo">
    </div>
    <h2 class="text-center mb-1">Welcome Back</h2>
    <p class="text-muted text-center small mb-4">Sign in to your account</p>

    <div id="loginError" class="alert alert-danger py-2 small d-none"></div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="spicyking@gmail.com">
    </div>
    <div class="mb-2">
      <label class="form-label">Password</label>
      <div class="position-relative">
        <input type="password" id="loginPassword" class="form-control pe-5" placeholder="••••••••••">
        <button type="button" class="btn btn-sm position-absolute end-0 top-50 translate-middle-y me-1 p-1 text-muted" id="togglePwd">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>
    <div class="text-end mb-3">
      <a href="#" class="auth-link small">Forgot password?</a>
    </div>
    <button class="btn btn-yellow w-100 py-2 mb-3" id="loginBtn">Sign In</button>
    <p class="text-center small text-muted">No account yet? <a href="register.html" class="auth-link">Register Now</a></p>

    <div class="mt-3 p-3 rounded-3" style="background:#f9f5e7; font-size:0.78rem; color:#666;">
      <strong>Demo credentials:</strong><br>
      Email: <small>demo@jph.com</small><br>
      Password: <small>Demo1234!</small>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="auth.js"></script>
<script>
const DUMMY = { email: 'demo@jph.com', password: 'Demo1234!' };

document.getElementById('loginBtn').addEventListener('click', () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  if (!email || !pwd) { err.textContent = 'Please fill in all fields.'; err.classList.remove('d-none'); return; }
  if (email === DUMMY.email && pwd === DUMMY.password) {
    localStorage.setItem('jph_logged_in', 'true');
    localStorage.setItem('jph_user', JSON.stringify({ firstName: 'Christian Joshua', lastName: 'Lacerna' }));
    window.location.href = 'index.html';
  } else {
    err.textContent = 'Invalid email or password. Try demo@jph.com / Demo1234!';
    err.classList.remove('d-none');
  }
});

document.getElementById('loginPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('togglePwd').addEventListener('click', () => {
  const inp = document.getElementById('loginPassword');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
});
</script>
</body>
</html>
